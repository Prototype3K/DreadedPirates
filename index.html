<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaded Pirates</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">
    <div class="content">
        <img src="logo.png" alt="Dreaded Pirates Logo" class="logo">
        <h1>Dreaded Pirates</h1>

        <div class="counter-box">
            You Are Now Part Of The Crew:
            <span id="count">Loading...</span>
        </div>
    </div>
</div>

<audio id="oceanAudio" autoplay loop>
    <source src="ocean.mp3" type="audio/mpeg">
</audio>

<script>
const SUPABASE_URL = "https://dvrezcegsoigjhtnycko.supabase.co";
const SUPABASE_KEY = "sb_publishable_KzAwcf42ED1gFRWxOPGi_w_G4zCe2Tp";

// Your table name
const TABLE_NAME = "crew";

async function fetchCrewCount() {
    try {
        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*`,
            {
                method: "GET",
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json"
                }
            }
        );

        const data = await response.json();

        document.getElementById("count").textContent = data.length;
    } catch (error) {
        console.error("Error fetching crew count:", error);
        document.getElementById("count").textContent = "Error";
    }
}

fetchCrewCount();
</script>

</body>
</html>
