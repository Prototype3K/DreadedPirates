<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaded Pirates</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay">
        <div class="content">

            <img src="logo.png" class="logo" alt="Dreaded Pirates">

            <h1>Dreaded Pirates</h1>

        </div>
    </div>

    <audio id="oceanAudio" autoplay loop>
        <source src="ocean.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("oceanAudio");

        audio.volume = 0.5;

        audio.play().catch(() => {
            document.body.addEventListener("click", () => {
                audio.play();
            }, { once: true });
        });
    </script>

</body>
</html>
