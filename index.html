<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaded Pirates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">
    <div class="content">
        <img src="logo.png" alt="Dreaded Pirates Logo" class="logo">
        <h1>Dreaded Pirates</h1>

        <div class="counter-box">
            You Are Now Part Of The Crew:
            <span id="count">Loading...</span>
        </div>
    </div>
</div>

<audio id="oceanAudio" autoplay loop>
    <source src="ocean.mp3" type="audio/mpeg">
</audio>

<script>
const SUPABASE_URL = "https://dvrezcegsoigjhtnycko.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_KzAwcf42ED1gFRWxOPGi_w_G4zCe2TpY";

const COUNTER_ID = "dreadedpirates_visits";
const counterEl = document.getElementById("count");

// Step 1: get current value
async function getCounter() {
  const res = await fetch(`${https://dvrezcegsoigjhtnycko.supabase.co/rest/v1/}/rest/v1/counters?id=eq.${COUNTER_ID}`, {
    headers: {
      apikey: sb_publishable_KzAwcf42ED1gFRWxOPGi_w_G4zCe2Tp,
      Authorization: `Bearer ${sb_publishable_KzAwcf42ED1gFRWxOPGi_w_G4zCe2Tp}`
    }
  });

  const data = await res.json();
  return data[0];
}

// Step 2: update counter
async function incrementCounter(currentValue) {
  const newValue = currentValue + 1;

  await fetch(`${https://dvrezcegsoigjhtnycko.supabase.co/rest/v1/}/rest/v1/counters?id=eq.${COUNTER_ID}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      apikey: sb_publishable_KzAwcf42ED1gFRWxOPGi_w_G4zCe2Tp,
      Authorization: `Bearer ${sb_publishable_KzAwcf42ED1gFRWxOPGi_w_G4zCe2Tp}`,
      Prefer: "return=representation"
    },
    body: JSON.stringify({ value: newValue })
  });

  return newValue;
}

// Step 3: run
(async () => {
  try {
    let counter = await getCounter();

    if (!counter) {
      counterEl.textContent = "83";
      return;
    }

    const updated = await incrementCounter(counter.value);
    counterEl.textContent = updated;
  } catch (err) {
    console.error(err);
    counterEl.textContent = "83";
  }
})();
</script>
</script>


</body>
</html>
