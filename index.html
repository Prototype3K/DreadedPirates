<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaded Pirates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">
    <div class="content">
        <img src="logo.png" alt="Dreaded Pirates Logo" class="logo">
        <h1>Dreaded Pirates</h1>

        <div class="counter-box">
            You Are Now Part Of The Crew:
            <span id="count">Loading...</span>
        </div>
    </div>
</div>

<audio id="oceanAudio" autoplay loop>
    <source src="ocean.mp3" type="audio/mpeg">
</audio>

<script>
const namespace = "dreadedpirates";
const key = "website_visits";

// Step 1: Get current value
fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
  .then(res => res.json())
  .then(data => {
    let current = data.value;

    // If counter doesn't exist yet or is below 83, reset it to 83
    if (current < 83 || isNaN(current)) {
      return fetch(`https://api.countapi.xyz/set/${namespace}/${key}?value=83`);
    }

    return data;
  })
  .then(() => {
    // Step 2: Increment counter
    return fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("count").textContent = data.value;
  })
  .catch(() => {
    document.getElementById("count").textContent = "83";
  });


// Audio fix (unchanged but safer)
const audio = document.getElementById("oceanAudio");
audio.volume = 0.5;

audio.play().catch(() => {
  document.body.addEventListener("click", () => audio.play(), { once: true });
});
</script>


</body>
</html>
