<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaded Pirates</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .counter-box {
            margin-top: 25px;
            text-align: center;
            color: #00ffcc;
            font-family: "Courier New", monospace;
            font-size: 22px;
        }

        .counter-box img {
            margin-top: 10px;
            border: 0;
            max-width: 100%;
            height: auto;
        }

        .sitecounter-link {
            display: none;
        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="content">

            <img src="logo.png" class="logo" alt="Dreaded Pirates">

            <h1>Dreaded Pirates</h1>

            <div class="counter-box">
                You Are Now Part Of The Crew:<br><br>

                <!-- HitWebCounter START -->
                <a href="https://www.hitwebcounter.com/business-days-calculator"
                   target="_blank"
                   rel="noopener"
                   title="Business Days Counter">

                    <img src="https://www.hitwebcounter.com/counter/counter.php?page=21506845&amp;style=0010&amp;nbdigits=5&amp;type=page"
                         alt="Visitor Counter"
                         decoding="async"
                         style="border:0;max-width:100%;height:auto;">
                </a>

                <br>

                <a href="https://www.hitwebcounter.com/"
                   target="_blank"
                   rel="noopener"
                   class="sitecounter-link">
                    SiteCounter
                </a>
                <!-- HitWebCounter END -->

            </div>

        </div>
    </div>

    <audio id="oceanAudio" autoplay loop>
        <source src="ocean.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("oceanAudio");

        audio.volume = 0.5;

        audio.play().catch(() => {
            document.body.addEventListener("click", () => {
                audio.play();
            }, { once: true });
        });
    </script>

</body>
</html>
